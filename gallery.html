<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Receipt Gallery — R:EL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .gallery-page{min-height:100vh;padding:5rem 2rem 4rem;position:relative;z-index:1}
    .gallery-header{max-width:960px;margin:0 auto 2.5rem}
    .gallery-back{font-size:.55rem;letter-spacing:.15em;color:var(--gray-mid);text-decoration:none;display:inline-block;margin-bottom:1.8rem;transition:color .3s}
    .gallery-back:hover{color:var(--text)}
    .gallery-title{font-size:1.6rem;font-weight:300;letter-spacing:.06em;margin-bottom:.8rem}
    .gallery-desc{font-size:.75rem;font-weight:300;line-height:1.8;color:var(--gray-mid);max-width:480px}
    .gallery-count{max-width:960px;margin:0 auto;padding:1.2rem 0;border-bottom:1px solid var(--border);margin-bottom:1.8rem;font-size:.5rem;letter-spacing:.2em;color:var(--gray)}
    .gallery-empty{max-width:960px;margin:0 auto;font-size:.7rem;font-weight:300;color:var(--gray);padding:2.5rem 0;border-top:1px solid var(--border)}
    .gallery-empty a{color:var(--gray-mid);text-decoration:underline;text-underline-offset:2px}
    .gallery-grid{max-width:960px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:1px;background:var(--border)}
    .gallery-item{background:var(--bg);padding:.8rem;display:flex;flex-direction:column;gap:.4rem}
    .gallery-item img{width:100%;height:auto;display:block;filter:grayscale(.1)}
    .gallery-item-date{font-size:.5rem;letter-spacing:.15em;color:var(--gray);font-weight:300}
  </style>
</head>
<body>
  <canvas id="glyph-bg" aria-hidden="true"></canvas>
  <nav id="nav"><div class="nav-inner"><a href="index.html#top" class="nav-logo">R:EL</a><div class="nav-links"><a href="index.html#urgency">URGENCY</a><a href="index.html#why">WHY</a><a href="index.html#submit">SUBMIT</a><a href="index.html#archive">ARCHIVE</a><a href="gallery.html" style="color:var(--text)">GALLERY</a><a href="index.html#sustain">SUSTAIN</a></div></div></nav>
  <div class="nav-mobile-overlay" id="nav-mobile"><button class="nav-mobile-close" id="nav-close">×</button><a href="index.html#urgency">URGENCY</a><a href="index.html#why">WHY</a><a href="index.html#submit">SUBMIT</a><a href="index.html#archive">ARCHIVE</a><a href="gallery.html">GALLERY</a><a href="index.html#sustain">SUSTAIN</a></div>
  <div class="gallery-page">
    <div class="gallery-header">
      <a href="index.html" class="gallery-back">← BACK TO ARCHIVE</a>
      <h1 class="gallery-title">RECEIPT GALLERY</h1>
      <p class="gallery-desc">Photographs of receipts submitted to the archive. Each image is a material trace of an economic and emotional moment. Anonymous. Timestamped. Public.</p>
    </div>
    <div class="gallery-count" id="gallery-count"></div>
    <div id="gallery-content"></div>
  </div>
  <script>
  function initGlyphCanvas(){const c=document.getElementById('glyph-bg');if(!c)return;const x=c.getContext('2d');function r(){c.width=window.innerWidth;c.height=document.documentElement.scrollHeight;d()}function d(){x.clearRect(0,0,c.width,c.height);x.font='10px IBM Plex Mono,monospace';x.fillStyle='#2A2A28';const ch='6699EEEE6699EE00669966EE9966EE00',cW=9,cH=13,cols=Math.ceil(c.width/cW),rows=Math.ceil(c.height/cH);for(let r=0;r<rows;r++)for(let cl=0;cl<cols;cl++){const nx=cl/cols,ny=r/rows,dist=Math.sqrt((nx-.5)**2+(ny-.35)**2),z1=Math.sin(ny*12)*.3+.5,z2=Math.cos(nx*8+ny*3)*.2,dn=z1+z2-(dist<.08?.8:0),h=((cl*7+r*13+cl*r)%97)/97;if(h<dn*.6)x.fillText(ch[(cl*3+r*7)%ch.length],cl*cW,r*cH)}}r();window.addEventListener('resize',()=>{clearTimeout(window._gr);window._gr=setTimeout(r,200)})}
  function loadGallery(){const ct=document.getElementById('gallery-content'),cn=document.getElementById('gallery-count');let p=[];try{const s=localStorage.getItem('rel_gallery');p=s?JSON.parse(s):[]}catch(e){p=[]}cn.textContent=`${p.length} RECEIPT${p.length!==1?'S':''} PHOTOGRAPHED`;if(!p.length){ct.innerHTML='<div class="gallery-empty">No receipts photographed yet. Submit a receipt with a photo from the <a href="index.html#submit">archive submission form</a>.</div>';return}p.sort((a,b)=>(b.timestamp||'').localeCompare(a.timestamp||''));const ms=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];ct.innerHTML='<div class="gallery-grid">'+p.map(ph=>{const d=new Date(ph.timestamp);return`<div class="gallery-item"><img src="${ph.image}" alt="Receipt photograph"><span class="gallery-item-date">${d.getDate()} ${ms[d.getMonth()]} ${d.getFullYear()} · ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}</span></div>`}).join('')+'</div>'}
  document.addEventListener('DOMContentLoaded',()=>{initGlyphCanvas();loadGallery();var logo=document.querySelector('.nav-logo'),o=document.getElementById('nav-mobile'),c=document.getElementById('nav-close');function isMob(){return window.innerWidth<=480}function upd(){if(isMob())logo.classList.add('is-trigger');else{logo.classList.remove('is-trigger');o.classList.remove('open')}}upd();window.addEventListener('resize',upd);if(logo&&o){logo.addEventListener('click',function(e){if(isMob()){e.preventDefault();o.classList.add('open')}});c.onclick=()=>o.classList.remove('open');o.querySelectorAll('a').forEach(a=>a.onclick=()=>o.classList.remove('open'))}});
  </script>
</body>
</html>
